<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<title>ល្បែងជ្រើសរើសបទចម្រៀង</title>

<style>
body{
    font-family: "Noto Sans Khmer", sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    margin:0;
    padding:40px;
}
h1{
    color:white;
    font-size:40px;
    margin-bottom:10px;
}
p{
    color:white;
    font-size:20px;
}
.grid{
    display:grid;
    grid-template-columns: repeat(3,200px);
    gap:40px;
    justify-content:center;
    margin-top:40px;
}
.card{
    width:200px;
    height:280px;
    background:white;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
    cursor:pointer;
    position:relative;
    transition:0.3s;
}
.card:hover{
    transform:scale(1.08);
}
.card img{
    width:100%;
    height:100%;
    border-radius:10px;
}
.number{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    font-weight:bold;
    color:red;
    text-shadow:2px 2px white;
}
iframe{
    margin-top:40px;
}
</style>
</head>

<body>

<h1>💖 សាកល្បងជ្រើសរើសកាតស្នេហា 💖</h1>
<p>ជ្រើសរើសកាតមួយ ដើម្បីស្តាប់បទចម្រៀងពិសេស 🎵</p>

<div class="grid">
  <div class="card" onclick="playSong()"><div class="number">1</div></div>
  <div class="card" onclick="playSong()"><div class="number">2</div></div>
  <div class="card" onclick="playSong()"><div class="number">3</div></div>
  <div class="card" onclick="playSong()"><div class="number">4</div></div>
  <div class="card" onclick="playSong()"><div class="number">5</div></div>
  <div class="card" onclick="playSong()"><div class="number">6</div></div>
</div>

<div id="player"></div>

<script>
const songs = [
  "jYKftSF9U5M",
  "m_XUClQCOUc",
  "bu3xKd3sJO4",
  "C4NkCKGXJ44",
  "X7OUf6EOCzY",
  "sUKD_ul8H1g"
];

function playSong(){
  let random = songs[Math.floor(Math.random()*songs.length)];
  document.getElementById("player").innerHTML = `
    <iframe width="560" height="315"
      src="https://www.youtube.com/embed/${random}?autoplay=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>`;
}
</script>

</body>
</html>
